<div class="auditoria-filters">
  <div class="filter-group">
    <label>Correo del Encuestador</label>
    <input type="email" id="inputUser" placeholder="encuestador@ese.com" autocomplete="off" />
  </div>
  <div class="filter-group">
    <label>Fecha Inicio</label>
    <input type="date" id="inputInicio" />
  </div>
  <div class="filter-group">
    <label>Fecha Fin</label>
    <input type="date" id="inputFin" />
  </div>
  <button class="btn-search" id="btnBuscar" onclick="buscarAuditoria()">🔍 Consultar</button>
</div>
